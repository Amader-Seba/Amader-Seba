<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amader-Seba</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="navbar">
    <div class="nav-brand"><i class="fas fa-hand-holding-heart"></i> Amader-Seba</div>
    <div id="nav-menu">
      <span id="userGreet"></span>
      <button id="homeBtn" class="nav-btn" style="display:none;"><i class="fas fa-home"></i> হোম</button>
      <button id="myOrdersBtn" class="nav-btn" style="display:none;"><i class="fas fa-shopping-bag"></i> অর্ডার</button>
      <button id="loginBtn" class="nav-btn"><i class="fas fa-sign-in-alt"></i> লগইন</button>
      <button id="registerBtn" class="nav-btn"><i class="fas fa-user-plus"></i> রেজিস্টার</button>
      <button id="logoutBtn" class="nav-btn" style="display:none;">লগআউট</button>
    </div>
  </nav>
  <div id="noticeBanner" style="display:none;"></div>
  <main id="app" class="container"></main>
  <div id="modalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal-content" id="modalContent"></div>
  </div>
  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
