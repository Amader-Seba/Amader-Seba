<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="description" content="আমাদের সেবা পোর্টাল - সেবাই মূল লক্ষ্য। এটি একটি মাল্টি-সার্ভিস এজেন্সি পোর্টাল যেখানে এনআইডি সার্ভিস, সিম বায়োমেট্রিক ও জন্ম নিবন্ধন সেবা পাওয়া যায়।" />
  <title>Amader Seba | আমাদের সেবা পোর্টাল</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- External StyleSheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Tailwind Custom Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Hind Siliguri', 'Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            'mono': ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          },
          animation: {
            'fade-in': 'fade-in 0.2s ease-out',
            'slide-up': 'slide-up 0.2s ease-out',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
  
  <style>
    /* Additional custom styles to ensure exact match with original design */
    body {
      background-color: #f8fafc;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="antialiased text-slate-800 bg-slate-50 font-sans selection:bg-emerald-100 selection:text-emerald-900">
  <div id="root"></div>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- React and ReactDOM CDN -->
  <script src="https://cdn.jsdelivr.net/npm/react@19.0.1/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@19.0.1/umd/react-dom.development.js"></script>
  
  <!-- Babel Standalone for JSX (if needed, but we already compiled) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Main Application Script (type module for ES modules) -->
  <script type="module" src="script.js"></script>
</body>
</html>
